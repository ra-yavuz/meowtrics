name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup update stable
          rustup component add clippy rustfmt
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev libdbus-1-dev shellcheck
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: shellcheck
        run: shellcheck scripts/*.sh debian/postinst debian/postrm docs/get.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev libdbus-1-dev
      - name: Build release binary
        run: cargo build --release --locked
      - name: Run tests
        run: cargo test --release

  deb:
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libssl-dev libdbus-1-dev dpkg-dev fakeroot
      - name: Build .deb
        run: bash scripts/build-deb.sh
      - name: Build plasmoid bundle
        run: bash scripts/build-plasmoid.sh
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.plasmoid
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
